<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maze Runner: Infinity</title>
    <style>
        :root { --primary: #3498db; --bg: #0a0a0a; --panel: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        /* Navigation */
        .top-nav { display: flex; gap: 20px; padding: 20px; z-index: 10; }
        .nav-box { border: 2px solid var(--primary); padding: 12px 30px; border-radius: 5px; background: var(--panel); cursor: pointer; font-weight: bold; text-transform: uppercase; }

        .stats { display: flex; gap: 50px; font-size: 24px; color: #f1c40f; margin-bottom: 10px; }

        /* Fullscreen Menus */
        .menu-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,10,10,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .menu-content { width: 80%; max-width: 900px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .item-card { background: var(--panel); border: 2px solid #333; padding: 15px; border-radius: 10px; cursor: pointer; }
        .item-card.active { border-color: var(--primary); }
        .preview-box { width: 40px; height: 40px; margin: 10px auto; border: 1px solid white; }

        .close-x { position: absolute; top: 30px; right: 50px; font-size: 40px; cursor: pointer; color: #e74c3c; }
        
        canvas { background: #000; border: 4px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        section { margin-top: 30px; border-top: 1px solid #333; padding-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-box" onclick="openMenu('shopMenu')">Shop</div>
        <div class="nav-box" onclick="openMenu('skinMenu')">Skins</div>
        <div class="nav-box" onclick="openMenu('settingsMenu')">Settings</div>
    </div>

    <div class="stats">
        <span>LVL: <span id="lvl">1</span></span>
        <span>BUCKET: <span id="buck">0</span></span>
        <span>BANK: <span id="bnk">0</span></span>
    </div>

    <canvas id="c" width="800" height="500"></canvas>

    <div id="shopMenu" class="menu-screen">
        <span class="close-x" onclick="closeAll()">×</span>
        <div class="menu-content">
            <h1>GLOBAL SHOP</h1>
            <section>
                <h3>PLAYER SKINS</h3>
                <div class="grid">
                    <div class="item-card" onclick="buySkin('Neon', 50, '#00ff00')">Neon (50G)</div>
                    <div class="item-card" onclick="buySkin('Gold', 150, '#f1c40f')">Royal Gold (150G)</div>
                    <div class="item-card" onclick="buySkin('Shadow', 300, '#555')">Shadow (300G)</div>
                </div>
            </section>
            <section>
                <h3>MAZE THEMES</h3>
                <div class="grid">
                    <div class="item-card" onclick="buyMaze('#e74c3c', 100)">Lava Theme (100G)</div>
                    <div class="item-card" onclick="buyMaze('#9b59b6', 200)">Void Theme (200G)</div>
                </div>
            </section>
        </div>
    </div>

    <div id="skinMenu" class="menu-screen">
        <span class="close-x" onclick="closeAll()">×</span>
        <div class="menu-content" id="skinList">
            <h1>YOUR SKINS</h1>
            <div class="grid" id="ownedSkinsGrid">
                </div>
        </div>
    </div>

    <div id="settingsMenu" class="menu-screen">
        <span class="close-x" onclick="closeAll()">×</span>
        <div class="menu-content">
            <h1>SETTINGS</h1>
            <button class="nav-box" onclick="toggleFog()">Toggle Visibility Fog: <span id="fogStatus">ON</span></button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        let bank = 0, bucket = 0, level = 1, fog = true;
        let pColor = "#00ff00", mColor = "#3498db";
        let player = { x: 40, y: 40, size: 20 };
        let walls = [], coins = [], lava = [], ownedSkins = ['#00ff00'];

        function openMenu(id) { document.getElementById(id).style.display = 'flex'; renderSkins(); }
        function closeAll() { document.querySelectorAll('.menu-screen').forEach(s => s.style.display='none'); }
        function toggleFog() { fog = !fog; document.getElementById('fogStatus').innerText = fog ? "ON" : "OFF"; draw(); }

        function generateLevel() {
            walls = [
                {x:0, y:0, w:800, h:10}, {x:0, y:490, w:800, h:10},
                {x:0, y:0, w:10, h:500}, {x:790, y:0, w:10, h:500}
            ];
            // Zufällige Wände basierend auf Level
            for(let i=0; i<6 + level; i++) {
                walls.push({
                    x: Math.random() * 600 + 100,
                    y: Math.random() * 300 + 50,
                    w: Math.random() > 0.5 ? 10 : 150,
                    h: Math.random() > 0.5 ? 150 : 10
                });
            }
            coins = []; for(let i=0; i<5; i++) coins.push({x: Math.random()*700+50, y:Math.random()*400+50, c:false});
            lava = []; for(let i=0; i<level+2; i++) lava.push({x: Math.random()*600+100, y:Math.random()*300+100, w:40, h:40});
            player.x = 30; player.y = 30;
        }

        function buySkin(name, price, color) {
            if(bank >= price && !ownedSkins.includes(color)) {
                bank -= price; ownedSkins.push(color);
                updateStats(); alert(name + " purchased!");
            } else { alert("Already owned or too poor!"); }
        }

        function buyMaze(color, price) {
            if(bank >= price) { bank -= price; mColor = color; updateStats(); alert("Maze Theme changed!"); }
        }

        function renderSkins() {
            const grid = document.getElementById('ownedSkinsGrid');
            grid.innerHTML = '';
            ownedSkins.forEach(s => {
                grid.innerHTML += `<div class="item-card" onclick="pColor='${s}'; closeAll(); draw();">
                    <div class="preview-box" style="background:${s}"></div>
                    ${pColor === s ? 'EQUIPPED' : 'EQUIP'}
                </div>`;
            });
        }

        function updateStats() {
            document.getElementById('lvl').innerText = level;
            document.getElementById('buck').innerText = bucket;
            document.getElementById('bnk').innerText = bank;
        }

        function draw() {
            ctx.clearRect(0,0,800,500);
            ctx.fillStyle = mColor; walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
            ctx.fillStyle = "#e74c3c"; lava.forEach(l => ctx.fillRect(l.x, l.y, l.w, l.h));
            ctx.fillStyle = "#f1c40f"; coins.forEach(c => { if(!c.c) {ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();} });
            
            ctx.fillStyle = "#27ae60"; ctx.fillRect(740, 400, 40, 80); // Goal
            
            ctx.fillStyle = pColor; ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.strokeStyle = "white"; ctx.strokeRect(player.x, player.y, player.size, player.size);

            if(fog) {
                ctx.save();
                ctx.globalCompositeOperation = 'destination-in';
                ctx.beginPath(); ctx.arc(player.x + 10, player.y + 10, 120, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        window.addEventListener("keydown", (e) => {
            let nX = player.x, nY = player.y;
            if(e.key === "ArrowUp") nY -= 15;
            if(e.key === "ArrowDown") nY += 15;
            if(e.key === "ArrowLeft") nX -= 15;
            if(e.key === "ArrowRight") nX += 15;
            if(e.key === "m") { bank += 100; updateStats(); }

            let hit = false;
            walls.forEach(w => { if(nX < w.x+w.w && nX+20 > w.x && nY < w.y+w.h && nY+20 > w.y) hit = true; });
            
            if(!hit && nX > 0 && nX < 780 && nY > 0 && nY < 480) {
                player.x = nX; player.y = nY;
                lava.forEach(l => { if(nX < l.x+l.w && nX+20 > l.x && nY < l.y+l.h && nY+20 > l.y) { player.x=30; player.y=30; bucket=0; updateStats(); }});
                coins.forEach(c => { if(!c.c && Math.hypot(nX-c.x, nY-c.y) < 25) { c.c=true; bucket+=10; updateStats(); }});
                if(nX > 730 && nY > 390) { bank += bucket; bucket = 0; level++; generateLevel(); updateStats(); }
            }
            draw();
        });

        generateLevel();
        draw();
    </script>
</body>
</html>
