<!DOCTYPE html>
<html>
<head>
    <title>Maze Runner Pro</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding-top: 20px; }
        
        /* Das Menü oben wie in deiner Zeichnung */
        .top-nav { display: flex; gap: 20px; margin-bottom: 20px; }
        .nav-box { border: 3px solid #3498db; padding: 10px 30px; border-radius: 8px; background: #1e1e1e; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .nav-box:hover { background: #3498db; color: white; }

        .stats-bar { display: flex; gap: 40px; font-size: 20px; margin-bottom: 10px; color: #f1c40f; }

        canvas { border: 5px solid #333; background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        
        .label { position: absolute; font-weight: bold; font-size: 14px; color: #555; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-box" onclick="alert('Shop öffnet bald!')">SHOP 🛒</div>
        <div class="nav-box" onclick="alert('Skins kommen gleich!')">SKINS ✨</div>
    </div>

    <div class="stats-bar">
        <span>Eimer 🪣: <span id="bucket">0</span></span>
        <span>Konto 💰: <span id="bank">0</span></span>
    </div>

    <div style="position: relative;">
        <canvas id="mazeCanvas" width="600" height="400"></canvas>
        <div class="label" style="left: 10px; bottom: 10px;">START</div>
        <div class="label" style="right: 10px; top: 180px;">ENDE</div>
    </div>

    <script>
        const canvas = document.getElementById("mazeCanvas");
        const ctx = canvas.getContext("2d");

        let player = { x: 15, y: 365, size: 20, color: "#00ff00" };
        let bucket = 0, bank = 0;

        // Labyrinth mit Sackgassen (basierend auf deiner Zeichnung)
        const walls = [
            // Außenwände
            {x: 0, y: 0, w: 600, h: 10}, {x: 0, y: 390, w: 600, h: 10},
            {x: 0, y: 0, w: 10, h: 350}, {x: 590, y: 0, w: 10, h: 150}, {x: 590, y: 250, w: 10, h: 150},

            // Sackgassen & Wege
            {x: 80, y: 80, w: 10, h: 320},   // Lange vertikale Wand
            {x: 80, y: 80, w: 200, h: 10},  // Abzweigung oben
            {x: 180, y: 150, w: 10, h: 150}, // Sackgasse Mitte
            {x: 180, y: 300, w: 150, h: 10}, // Unterer Gang
            {x: 350, y: 0, w: 10, h: 250},   // Trennwand rechts
            {x: 450, y: 150, w: 150, h: 10}, // Gang zum Ende
            {x: 350, y: 320, w: 150, h: 10}, // Letzte Sackgasse
            {x: 450, y: 150, w: 10, h: 100}  // Hindernis vor Ende
        ];

        let coins = [
            {x: 40, y: 40, collected: false}, {x: 250, y: 40, collected: false},
            {x: 130, y: 200, collected: false}, {x: 400, y: 350, collected: false},
            {x: 550, y: 350, collected: false}
        ];

        const goal = {x: 560, y: 160, w: 30, h: 80};

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Wände
            ctx.fillStyle = "#34495e";
            walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

            // Münzen
            ctx.fillStyle = "#f1c40f";
            coins.forEach(c => {
                if(!c.collected) {
                    ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
                }
            });

            // Ziel
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

            // Spieler
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.strokeStyle = "white"; ctx.strokeRect(player.x, player.y, player.size, player.size);
        }

        window.addEventListener("keydown", (e) => {
            let nX = player.x, nY = player.y;
            const s = 10;
            if(e.key === "ArrowUp") nY -= s;
            if(e.key === "ArrowDown") nY += s;
            if(e.key === "ArrowLeft") nX -= s;
            if(e.key === "ArrowRight") nX += s;

            let hit = false;
            walls.forEach(w => {
                if (nX < w.x + w.w && nX + player.size > w.x && nY < w.y + w.h && nY + player.size > w.y) hit = true;
            });

            if(!hit && nX >= 0 && nX + player.size <= 600 && nY >= 0 && nY + player.size <= 400) {
                player.x = nX; player.y = nY;
                
                coins.forEach(c => {
                    if(!c.collected && Math.hypot(player.x + 10 - c.x, player.y + 10 - c.y) < 20) {
                        c.collected = true; bucket += 10;
                        document.getElementById("bucket").innerText = bucket;
                    }
                });

                if(player.x + player.size > goal.x && player.y > goal.y && player.y < goal.y + goal.h) {
                    bank += bucket; bucket = 0;
                    document.getElementById("bucket").innerText = bucket;
                    document.getElementById("bank").innerText = bank;
                    player.x = 15; player.y = 365; // Zurück zum Start
                    coins.forEach(c => c.collected = false);
                }
            }
            draw();
        });
        draw();
    </script>
</body>
</html>
