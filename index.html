<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maze Runner: Berki Ultimate</title>
    <style>
        :root { --primary: #3498db; --bg: #0a0a0a; --panel: #1a1a1a; --accent: #f1c40f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        .top-nav { display: flex; gap: 20px; padding: 15px; z-index: 10; }
        .nav-box { border: 2px solid var(--primary); padding: 10px 25px; border-radius: 5px; background: var(--panel); cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .nav-box:hover { background: var(--primary); }
        .stats { display: flex; gap: 40px; font-size: 22px; color: var(--accent); margin-bottom: 5px; font-weight: bold; }

        /* Fullscreen Menu according to Berki's Drawing */
        .menu-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,10,10,0.98); z-index: 1000; padding: 40px; box-sizing: border-box; }
        .menu-layout { display: flex; width: 100%; height: 90%; gap: 40px; margin-top: 20px; }
        
        /* Left side: Grid */
        .grid-area { flex: 2; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; padding-right: 20px; }
        .item-tile { background: #222; border: 2px solid #444; aspect-ratio: 1; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .item-tile:hover { border-color: var(--primary); }
        .item-tile.selected { border-color: var(--accent); background: #333; }
        .tile-preview { width: 40px; height: 40px; border: 1px solid white; }

        /* Right side: Preview (Exactly like Berki's drawing) */
        .preview-area { flex: 1; background: var(--panel); border: 3px solid var(--primary); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .big-preview { width: 100px; height: 100px; border: 4px solid white; margin-bottom: 30px; }
        .action-btn { width: 80%; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-equip { background: #27ae60; color: white; }
        .btn-unequip { background: #e67e22; color: white; }
        .btn-buy { background: var(--accent); color: black; }

        .close-btn { position: absolute; top: 20px; right: 40px; font-size: 40px; color: #e74c3c; cursor: pointer; }
        canvas { border: 4px solid #333; background: #000; box-shadow: 0 0 40px black; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-box" onclick="openMenu('shopMenu')">Shop</div>
        <div class="nav-box" onclick="openMenu('skinMenu')">Skins</div>
        <div class="nav-box" onclick="openMenu('settingsMenu')">Settings</div>
    </div>

    <div class="stats">
        <span>LVL: <span id="ui-lvl">1</span></span>
        <span>GOLD: <span id="ui-bank">0</span> 💰</span>
        <span>CARRY: <span id="ui-buck">0</span> 🪣</span>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <div id="skinMenu" class="menu-screen">
        <span class="close-btn" onclick="closeMenus()">×</span>
        <h1>CHARACTER SKINS</h1>
        <div class="menu-layout">
            <div id="skinGrid" class="grid-area"></div>
            <div class="preview-area">
                <div id="p-skin-box" class="big-preview"></div>
                <h2 id="p-skin-name">Select a Skin</h2>
                <button id="p-skin-btn" class="action-btn" onclick="handleSkinAction()">Action</button>
            </div>
        </div>
    </div>

    <div id="shopMenu" class="menu-screen">
        <span class="close-btn" onclick="closeMenus()">×</span>
        <h1>GLOBAL SHOP</h1>
        <div class="menu-layout">
            <div id="shopGrid" class="grid-area"></div>
            <div class="preview-area">
                <div id="s-item-box" class="big-preview"></div>
                <h2 id="s-item-name">Select Item</h2>
                <p id="s-item-cost"></p>
                <button id="s-item-btn" class="action-btn btn-buy" onclick="handleShopAction()">Buy</button>
            </div>
        </div>
    </div>

    <div id="settingsMenu" class="menu-screen">
        <span class="close-btn" onclick="closeMenus()">×</span>
        <div style="text-align:center; width:100%; margin-top:100px;">
            <h1>SETTINGS</h1>
            <button class="nav-box" onclick="toggleFog()">Fog of War: <span id="fog-status">ON</span></button>
            <p>Your progress is automatically saved to this browser.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game State & Save Logic
        let state = JSON.parse(localStorage.getItem('mazeRunnerSave')) || {
            bank: 0, level: 1, 
            ownedSkins: ['#00ff00'], 
            activeSkin: '#00ff00',
            mazeColor: '#3498db',
            fog: true
        };

        function save() { localStorage.setItem('mazeRunnerSave', JSON.stringify(state)); }

        let bucket = 0;
        let player = { x: 30, y: 30, size: 20 };
        let walls = [], coins = [], lava = [];
        let selectedSkin = state.activeSkin;
        let selectedShopItem = null;

        const allSkins = [
            {id: '#00ff00', name: 'Neon Green', cost: 0},
            {id: '#3498db', name: 'Ocean Blue', cost: 50},
            {id: '#f1c40f', name: 'Pure Gold', cost: 150},
            {id: '#e74c3c', name: 'Fire Red', cost: 200},
            {id: '#9b59b6', name: 'Shadow Purple', cost: 300},
            {id: '#ffffff', name: 'Ghost', cost: 500}
        ];

        // Functions
        function openMenu(id) { 
            document.getElementById(id).style.display = 'block'; 
            if(id === 'skinMenu') renderSkinGrid();
            if(id === 'shopMenu') renderShopGrid();
        }
        function closeMenus() { document.querySelectorAll('.menu-screen').forEach(m => m.style.display='none'); }
        function toggleFog() { state.fog = !state.fog; document.getElementById('fog-status').innerText = state.fog ? "ON" : "OFF"; save(); draw(); }

        function renderSkinGrid() {
            const grid = document.getElementById('skinGrid');
            grid.innerHTML = '';
            allSkins.forEach(skin => {
                if(state.ownedSkins.includes(skin.id)) {
                    let div = document.createElement('div');
                    div.className = `item-tile ${selectedSkin === skin.id ? 'selected' : ''}`;
                    div.innerHTML = `<div class="tile-preview" style="background:${skin.id}"></div>`;
                    div.onclick = () => selectSkin(skin);
                    grid.appendChild(div);
                }
            });
            selectSkin(allSkins.find(s => s.id === selectedSkin));
        }

        function selectSkin(skin) {
            selectedSkin = skin.id;
            document.getElementById('p-skin-box').style.background = skin.id;
            document.getElementById('p-skin-name').innerText = skin.name;
            const btn = document.getElementById('p-skin-btn');
            if(state.activeSkin === skin.id) {
                btn.innerText = "Equipped"; btn.className = "action-btn btn-unequip";
            } else {
                btn.innerText = "Equip"; btn.className = "action-btn btn-equip";
            }
            renderSkinGrid();
        }

        function handleSkinAction() {
            state.activeSkin = selectedSkin;
            save(); renderSkinGrid(); draw();
        }

        function renderShopGrid() {
            const grid = document.getElementById('shopGrid');
            grid.innerHTML = '';
            allSkins.forEach(skin => {
                if(!state.ownedSkins.includes(skin.id)) {
                    let div = document.createElement('div');
                    div.className = "item-tile";
                    div.innerHTML = `<div class="tile-preview" style="background:${skin.id}"></div>`;
                    div.onclick = () => selectShopItem(skin);
                    grid.appendChild(div);
                }
            });
        }

        function selectShopItem(item) {
            selectedShopItem = item;
            document.getElementById('s-item-box').style.background = item.id;
            document.getElementById('s-item-name').innerText = item.name;
            document.getElementById('s-item-cost').innerText = `Cost: ${item.cost} Gold`;
        }

        function handleShopAction() {
            if(selectedShopItem && state.bank >= selectedShopItem.cost) {
                state.bank -= selectedShopItem.cost;
                state.ownedSkins.push(selectedShopItem.id);
                save(); updateUI(); renderShopGrid();
                alert("Purchased!");
            } else { alert("Not enough gold!"); }
        }

        function generateLevel() {
            walls = [
                {x:0,y:0,w:800,h:10},{x:0,y:440,w:800,h:10},
                {x:0,y:0,w:10,h:450},{x:790,y:0,w:10,h:450}
            ];
            for(let i=0; i<5+state.level; i++) {
                walls.push({
                    x: Math.random()*600+100, y: Math.random()*300+50,
                    w: Math.random()>0.5?10:120, h: Math.random()>0.5?120:10
                });
            }
            coins = []; for(let i=0; i<6; i++) coins.push({x: Math.random()*700+50, y: Math.random()*350+50, c:false});
            lava = []; for(let i=0; i<state.level; i++) lava.push({x: Math.random()*600+100, y: Math.random()*300+50, w:30, h:30});
            player.x = 30; player.y = 30;
        }

        function updateUI() {
            document.getElementById('ui-lvl').innerText = state.level;
            document.getElementById('ui-bank').innerText = state.bank;
            document.getElementById('ui-buck').innerText = bucket;
        }

        function draw() {
            ctx.clearRect(0,0,800,450);
            ctx.fillStyle = state.mazeColor;
            walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
            ctx.fillStyle = "#e74c3c"; lava.forEach(l => ctx.fillRect(l.x, l.y, l.w, l.h));
            ctx.fillStyle = varColor('--accent');
            coins.forEach(c => { if(!c.c) { ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill(); }});
            
            ctx.fillStyle = "#27ae60"; ctx.fillRect(740, 180, 40, 80); // Goal
            
            ctx.fillStyle = state.activeSkin; ctx.fillRect(player.x, player.y, 20, 20);
            ctx.strokeStyle = "white"; ctx.strokeRect(player.x, player.y, 20, 20);

            if(state.fog) {
                ctx.save();
                ctx.globalCompositeOperation = 'destination-in';
                ctx.beginPath(); ctx.arc(player.x+10, player.y+10, 100, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        window.addEventListener("keydown", (e) => {
            let nX = player.x, nY = player.y;
            if(e.key === "ArrowUp") nY -= 15;
            if(e.key === "ArrowDown") nY += 15;
            if(e.key === "ArrowLeft") nX -= 15;
            if(e.key === "ArrowRight") nX += 15;
            if(e.key === "m") { state.bank += 100; save(); updateUI(); } // Dev Cheat

            let hit = false;
            walls.forEach(w => { if(nX < w.x+w.w && nX+20 > w.x && nY < w.y+w.h && nY+20 > w.y) hit = true; });
            
            if(!hit && nX > 0 && nX < 780 && nY > 0 && nY < 430) {
                player.x = nX; player.y = nY;
                lava.forEach(l => { if(nX < l.x+l.w && nX+20 > l.x && nY < l.y+l.h && nY+20 > l.y) { player.x=30; player.y=30; bucket=0; updateUI(); }});
                coins.forEach(c => { if(!c.c && Math.hypot(nX-c.x, nY-c.y) < 25) { c.c=true; bucket+=10; updateUI(); }});
                if(nX > 730 && nY > 170 && nY < 270) { 
                    state.bank += bucket; bucket = 0; state.level++; 
                    save(); generateLevel(); updateUI(); 
                }
            }
            draw();
        });

        // Füge diese Verbesserungen in deinen bestehenden <script> Teil ein oder ersetze ihn:

        function generateLevel() {
            // Level-Größe variiert jetzt!
            canvas.width = 600 + (state.level * 20 > 400 ? 400 : state.level * 20); 
            
            walls = [
                {x:0,y:0,w:canvas.width,h:10},{x:0,y:440,w:canvas.width,h:10},
                {x:0,y:0,w:10,h:450},{x:canvas.width-10,y:0,w:10,h:450}
            ];
            
            // Komplexere Algorithmen für Wände
            for(let i=0; i<8 + state.level; i++) {
                walls.push({
                    x: Math.random()*(canvas.width-200)+100, 
                    y: Math.random()*300+50,
                    w: Math.random()>0.5?15:100, 
                    h: Math.random()>0.5?100:15
                });
            }

            // Mehr Münzen = Mehr Gier!
            coins = []; 
            for(let i=0; i<5 + Math.floor(state.level/2); i++) {
                coins.push({x: Math.random()*(canvas.width-100)+50, y:Math.random()*350+50, c:false});
            }

            // Fiese Lava
            lava = []; 
            for(let i=0; i<state.level + 2; i++) {
                lava.push({
                    x: Math.random()*(canvas.width-150)+100, 
                    y: Math.random()*300+50, 
                    w: 25 + (Math.random()*20), 
                    h: 25 + (Math.random()*20),
                    vx: (Math.random()-0.5) * 2, // Lava bewegt sich leicht!
                    vy: (Math.random()-0.5) * 2
                });
            }
            player.x = 30; player.y = 30;
        }

        // In der draw() Funktion für die Lava:
        function moveLava() {
            lava.forEach(l => {
                l.x += l.vx;
                l.y += l.vy;
                // Lava prallt an Wänden ab
                if(l.x < 10 || l.x + l.w > canvas.width - 10) l.vx *= -1;
                if(l.y < 10 || l.y + l.h > 440) l.vy *= -1;
            });
        }

        // Und im Game-Loop (unten beim Keydown oder in einem Intervall)
        setInterval(() => {
            moveLava();
            draw();
        }, 30);        generateLevel();
        updateUI();
        draw();
    </script>
</body>
</html>
