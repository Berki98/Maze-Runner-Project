<!DOCTYPE html>
<html>
<head>
    <title>Maze Runner Pro - Shop Edition</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding-top: 20px; overflow: hidden; }
        
        .top-nav { display: flex; gap: 20px; margin-bottom: 20px; }
        .nav-box { border: 3px solid #3498db; padding: 10px 30px; border-radius: 8px; background: #1e1e1e; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-box:hover { background: #3498db; }

        .stats-bar { display: flex; gap: 40px; font-size: 22px; margin-bottom: 10px; color: #f1c40f; font-weight: bold; }

        canvas { border: 5px solid #333; background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        
        /* Menü-Style */
        .overlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; border: 4px solid #3498db; padding: 20px; border-radius: 15px; z-index: 10; width: 300px; text-align: center; }
        .overlay h2 { margin-top: 0; color: #3498db; }
        .skin-btn { width: 100%; margin: 5px 0; padding: 10px; cursor: pointer; background: #333; color: white; border: none; border-radius: 5px; }
        .skin-btn:hover { background: #444; }
        .close-btn { margin-top: 15px; background: #e74c3c; padding: 5px 15px; cursor: pointer; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-box" onclick="toggleMenu('shopMenu')">SHOP 🛒</div>
        <div class="nav-box" onclick="toggleMenu('skinMenu')">SKINS ✨</div>
    </div>

    <div class="stats-bar">
        <span>Eimer 🪣: <span id="bucket">0</span></span>
        <span>Konto 💰: <span id="bank">0</span></span>
    </div>

    <canvas id="mazeCanvas" width="600" height="400"></canvas>

    <div id="shopMenu" class="overlay">
        <h2>SHOP</h2>
        <p>Sammle Gold im Ziel, um zu kaufen!</p>
        <button class="skin-btn" onclick="buyWallColor('#e67e22', 50)">Orange Wände (50 Gold)</button>
        <button class="skin-btn" onclick="buyWallColor('#9b59b6', 100)">Lila Wände (100 Gold)</button>
        <div class="close-btn" onclick="toggleMenu('shopMenu')">Schließen</div>
    </div>

    <div id="skinMenu" class="overlay">
        <h2>PLAYER SKINS</h2>
        <button class="skin-btn" onclick="changePlayerColor('#00ff00')">Standard (Grün)</button>
        <button class="skin-btn" onclick="changePlayerColor('#3498db')">Blue Hero</button>
        <button class="skin-btn" onclick="changePlayerColor('#f1c40f')">Golden Boy</button>
        <div class="close-btn" onclick="toggleMenu('skinMenu')">Schließen</div>
    </div>

    <script>
        const canvas = document.getElementById("mazeCanvas");
        const ctx = canvas.getContext("2d");

        let player = { x: 15, y: 365, size: 20, color: "#00ff00" };
        let wallColor = "#34495e";
        let bucket = 0, bank = 0;

        const walls = [
            {x: 0, y: 0, w: 600, h: 10}, {x: 0, y: 390, w: 600, h: 10},
            {x: 0, y: 0, w: 10, h: 350}, {x: 590, y: 0, w: 10, h: 150}, {x: 590, y: 250, w: 10, h: 150},
            {x: 80, y: 80, w: 10, h: 320}, {x: 80, y: 80, w: 200, h: 10},
            {x: 180, y: 150, w: 10, h: 150}, {x: 180, y: 300, w: 150, h: 10},
            {x: 350, y: 0, w: 10, h: 250}, {x: 450, y: 150, w: 150, h: 10},
            {x: 350, y: 320, w: 150, h: 10}, {x: 450, y: 150, w: 10, h: 100}
        ];

        let coins = [
            {x: 40, y: 40, collected: false}, {x: 250, y: 40, collected: false},
            {x: 130, y: 200, collected: false}, {x: 400, y: 350, collected: false},
            {x: 550, y: 350, collected: false}
        ];

        const goal = {x: 560, y: 160, w: 30, h: 80};

        function toggleMenu(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function changePlayerColor(c) { player.color = c; draw(); }

        function buyWallColor(c, price) {
            if(bank >= price) {
                bank -= price;
                wallColor = c;
                document.getElementById('bank').innerText = bank;
                draw();
                alert("Wandfarbe geändert!");
            } else {
                alert("Nicht genug Gold auf dem Konto!");
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = wallColor;
            walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
            ctx.fillStyle = "#f1c40f";
            coins.forEach(c => {
                if(!c.collected) { ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill(); }
            });
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.strokeStyle = "white"; ctx.strokeRect(player.x, player.y, player.size, player.size);
        }

        window.addEventListener("keydown", (e) => {
            let nX = player.x, nY = player.y;
            const s = 10;
            if(e.key === "ArrowUp") nY -= s;
            if(e.key === "
