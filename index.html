<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Maze Runner: Life of Quality</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding-top: 10px; overflow: hidden; }
        .top-nav { display: flex; gap: 15px; margin-bottom: 10px; z-index: 100; }
        .nav-box { border: 2px solid #3498db; padding: 10px 20px; border-radius: 8px; background: #1a1a1a; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .nav-box:hover { background: #3498db; }
        .story-btn { border-color: #e74c3c; color: #e74c3c; }
        .stats-bar { display: flex; gap: 30px; font-size: 20px; margin-bottom: 5px; color: #f1c40f; font-weight: bold; }
        #gameContainer { position: relative; border: 4px solid #333; line-height: 0; }
        canvas { background: #000; }
        .overlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; border: 3px solid #3498db; padding: 20px; border-radius: 15px; z-index: 200; width: 300px; text-align: center; }
        .skin-btn { width: 100%; margin: 5px 0; padding: 10px; cursor: pointer; background: #333; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-box" onclick="toggleMenu('shopMenu')">SHOP 🛒</div>
        <div class="nav-box story-btn" onclick="startStory()">STORY MODE 📖</div>
        <div class="nav-box" onclick="toggleMenu('skinMenu')">SKINS ✨</div>
    </div>

    <div class="stats-bar">
        <span>Level: <span id="lvlDisplay">1</span></span>
        <span>Eimer: <span id="bucketVal">0</span> 🪣</span>
        <span>Konto: <span id="bankVal">0</span> 💰</span>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <div id="shopMenu" class="overlay">
        <h2 style="color:#f1c40f">SHOP</h2>
        <button class="skin-btn" onclick="buyDifficulty('Medium', 50)">Medium Maze (50G)</button>
        <button class="skin-btn" onclick="buyDifficulty('Hard', 150)">ULTRA HARD (150G)</button>
        <div onclick="toggleMenu('shopMenu')" style="cursor:pointer; margin-top:10px; color:#e74c3c">Schließen</div>
    </div>

    <div id="skinMenu" class="overlay">
        <h2 style="color:#3498db">SKINS</h2>
        <button class="skin-btn" onclick="setPlayer('#00ff00')">Standard Green</button>
        <button class="skin-btn" onclick="setPlayer('#f1c40f')">Golden Skin (Free)</button>
        <button class="skin-btn" onclick="setPlayer('#9b59b6')">Purple Ghost</button>
        <div onclick="toggleMenu('skinMenu')" style="cursor:pointer; margin-top:10px; color:#e74c3c">Schließen</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let bank = 0, bucket = 0, level = 1;
        let player = { x: 30, y: 360, size: 18, color: "#00ff00" };
        let lava = [];
        let coins = [];
        let difficulty = "Easy";

        const walls = [
            {x: 0, y: 0, w: 600, h: 10}, {x: 0, y: 390, w: 600, h: 10},
            {x: 0, y: 0, w: 10, h: 350}, {x: 590, y: 0, w: 10, h: 150}, {x: 590, y: 250, w: 10, h: 150},
            {x: 100, y: 100, w: 10, h: 300}, {x: 250, y: 0, w: 10, h: 250},
            {x: 400, y: 150, w: 200, h: 10}, {x: 400, y: 250, w: 10, h: 150}
        ];

        const goal = {x: 560, y: 170, w: 30, h: 60};

        function spawnLava() {
            lava = [];
            let count = level + 3; 
            for(let i=0; i<count; i++) {
                lava.push({
                    x: Math.random() * 500 + 50,
                    y: Math.random() * 300 + 50,
                    w: 30 + (level * 5),
                    h: 30 + (level * 5)
                });
            }
        }

        function spawnCoins() {
            coins = [];
            let count = (level % 3 === 0) ? 8 : 4; // Bonus Level alle 3 Level
            for(let i=0; i<count; i++) {
                coins.push({ x: Math.random() * 550 + 20, y: Math.random() * 350 + 20, collected: false });
            }
        }

        function toggleMenu(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === "block") ? "none" : "block";
        }

        function startStory() {
            alert("STORY: Du bist Berki, der letzte Maze-Runner. Sammle Gold, um die Dunkelheit zu besiegen!");
        }

        function setPlayer(c) { player.color = c; toggleMenu('skinMenu'); draw(); }

        function buyDifficulty(d, price) {
            if(bank >= price) {
                bank -= price; difficulty = d;
                alert("Modus " + d + " aktiviert!");
                updateStats(); toggleMenu('shopMenu');
            } else { alert("Zu wenig Gold!"); }
        }

        function updateStats() {
            document.getElementById("bucketVal").innerText = bucket;
            document.getElementById("bankVal").innerText = bank;
            document.getElementById("lvlDisplay").innerText = level;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Alles zeichnen
            ctx.fillStyle = "#34495e";
            walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
            
            ctx.fillStyle = "#e67e22"; // Lava
            lava.forEach(l => ctx.fillRect(l.x, l.y, l.w, l.h));

            ctx.fillStyle = "#f1c40f"; // Münzen
            coins.forEach(c => {
                if(!c.collected) { ctx.beginPath(); ctx.arc(c.x, c.y, 7, 0, Math.PI*2); ctx.fill(); }
            });

            ctx.fillStyle = "#27ae60"; // Ziel
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // 2. AMONG US EFFEKT (FOG OF WAR)
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';
            ctx.beginPath();
            ctx.arc(player.x + 9, player.y + 9, 100, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        window.addEventListener("keydown", (e) => {
            let nX = player.x, nY = player.y;
            const speed = 12;
            if(e.key === "ArrowUp") nY -= speed;
            if(e.key === "ArrowDown") nY += speed;
            if(e.key === "ArrowLeft") nX -= speed;
            if(e.key === "ArrowRight") nX += speed;
            if(e.key === "m") { bank += 50; updateStats(); } // Cheat

            let hitWall = false;
            walls.forEach(w => {
                if (nX < w.x + w.w && nX + player.size > w.x && nY < w.y + w.h && nY + player.size > w.y) hitWall = true;
            });

            if(!hitWall && nX > 0 && nX < 580 && nY > 0 && nY < 380) {
                player.x = nX; player.y = nY;

                // Lava Check
                lava.forEach(l => {
                    if (player.x < l.x + l.w && player.x + player.size > l.x && player.y < l.y + l.h && player.y + player.size > l.y) {
                        player.x = 30; player.y = 360; bucket = 0; updateStats(); // Reset bei Lava
                    }
                });

                // Münzen Check
                coins.forEach(c => {
                    if(!c.collected && Math.hypot(player.x - c.x, player.y - c.y) < 20) {
                        c.collected = true; bucket += 10; updateStats();
                    }
                });

                // Ziel Check
                if(player.x + player.size > goal.x && player.y > goal.y && player.y < goal.y + goal.h) {
                    bank += bucket; bucket = 0; level++;
                    player.x = 30; player.y = 360;
                    spawnLava(); spawnCoins(); updateStats();
                }
            }
            draw();
        });

        spawnLava();
        spawnCoins();
        draw();
    </script>
</body>
</html>
