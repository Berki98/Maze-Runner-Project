<!DOCTYPE html>
<html>
<head>
    <title>Maze Runner XP Edition</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* Fullscreen Layout */
        #game-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* XP Bar am unteren Bildschirmrand */
        .xp-container { position: absolute; bottom: 20px; width: 80%; background: #333; height: 30px; border-radius: 15px; border: 2px solid #555; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #3498db, #9b59b6); transition: width 0.3s; }
        #xp-text { position: absolute; width: 100%; text-align: center; top: 5px; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; }

        .stats { position: absolute; top: 20px; font-size: 24px; color: #f1c40f; font-weight: bold; }
        
        canvas { background: #000; border: 3px solid #444; }

        /* Belohnung Button */
        #reward-btn { display: none; position: absolute; bottom: 60px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="stats">Bank: <span id="bankDisplay">0</span> 💰 | Level: <span id="lvlDisplay">1</span></div>
    
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div id="reward-btn" onclick="claimReward()">🎁 BELOHNUNG ABHOLEN!</div>

    <div class="xp-container">
        <div id="xp-bar"></div>
        <div id="xp-text">XP: 0 / 100</div>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let bank = 0, xp = 0, xpNeeded = 100, level = 1;
    let player = { x: 30, y: 440, size: 20, color: "#00ff00" };
    
    const goal = { x: 750, y: 200, w: 40, h: 100 };

    function updateUI() {
        document.getElementById("bankDisplay").innerText = bank;
        document.getElementById("lvlDisplay").innerText = level;
        
        // XP Bar berechnen
        let percent = (xp / xpNeeded) * 100;
        document.getElementById("xp-bar").style.width = percent + "%";
        document.getElementById("xp-text").innerText = `XP: ${xp} / ${xpNeeded}`;

        // Belohnung anzeigen wenn XP voll
        if (xp >= xpNeeded) {
            document.getElementById("reward-btn").style.display = "block";
        } else {
            document.getElementById("reward-btn").style.display = "none";
        }
    }

    function claimReward() {
        alert("Glückwunsch! Du hast 50 Bonus-Gold erhalten!");
        bank += 50;
        xp = 0; // Reset XP nach Abholen
        xpNeeded += 50; // Nächstes Mal schwerer
        updateUI();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Ziel
        ctx.fillStyle = "#27ae60";
        ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

        // Spieler
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);
    }

    window.addEventListener("keydown", (e) => {
        const s = 15;
        if(e.key === "ArrowUp") player.y -= s;
        if(e.key === "ArrowDown") player.y += s;
        if(e.key === "ArrowLeft") player.x -= s;
        if(e.key === "ArrowRight") player.x += s;

        // Ziel-Check
        if(player.x + 20 > goal.x && player.y > goal.y && player.y < goal.y + goal.h) {
            xp += 25; // 25 XP pro Ziel
            bank += 10;
            player.x = 30; player.y = 440;
            updateUI();
        }
        draw();
    });

    updateUI();
    draw();
</script>

</body>
</html>
